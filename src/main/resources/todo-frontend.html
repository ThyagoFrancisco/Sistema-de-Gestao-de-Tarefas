<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do API — Gestão de Tarefas</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #0d0f14;
          --surface:  #151821;
          --card:     #1c2030;
          --border:   #272d3d;
          --accent:   #5b7fff;
          --accent2:  #a78bfa;
          --success:  #34d399;
          --danger:   #f87171;
          --warn:     #fbbf24;
          --text:     #e2e8f0;
          --muted:    #64748b;
          --low:      #34d399;
          --med:      #fbbf24;
          --high:     #f87171;
          --radius:   10px;
          --mono:     'JetBrains Mono', monospace;
          --sans:     'Sora', sans-serif;
        }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          min-height: 100vh;
          display: grid;
          grid-template-columns: 320px 1fr;
          grid-template-rows: 64px 1fr;
          grid-template-areas: "header header" "sidebar main";
        }

        /* ─── HEADER ─── */
        header {
          grid-area: header;
          background: var(--surface);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 32px;
        }
        .logo {
          font-family: var(--mono);
          font-size: 15px;
          font-weight: 700;
          color: var(--accent);
          letter-spacing: -0.5px;
        }
        .logo span { color: var(--muted); font-weight: 400; }
        .api-badge {
          font-family: var(--mono);
          font-size: 11px;
          background: #1e2a47;
          color: var(--accent);
          padding: 4px 10px;
          border-radius: 20px;
          border: 1px solid #2d3d6a;
        }
        .stats-bar {
          display: flex;
          gap: 24px;
          align-items: center;
        }
        .stat { font-size: 12px; color: var(--muted); }
        .stat strong { color: var(--text); font-weight: 600; }

        /* ─── SIDEBAR ─── */
        aside {
          grid-area: sidebar;
          background: var(--surface);
          border-right: 1px solid var(--border);
          padding: 24px;
          display: flex;
          flex-direction: column;
          gap: 24px;
          overflow-y: auto;
        }

        .section-label {
          font-size: 10px;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 1.5px;
          color: var(--muted);
          margin-bottom: 10px;
        }

        /* FORM */
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 12px; color: var(--muted); font-weight: 500; }
        input[type="text"], textarea, select {
          background: var(--card);
          border: 1px solid var(--border);
          color: var(--text);
          font-family: var(--sans);
          font-size: 13px;
          border-radius: var(--radius);
          padding: 9px 12px;
          outline: none;
          transition: border-color .2s;
          resize: none;
          width: 100%;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
          border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(91,127,255,.15);
        }
        select option { background: var(--card); }
        textarea { height: 80px; }

        .btn {
          font-family: var(--sans);
          font-size: 13px;
          font-weight: 600;
          border: none;
          border-radius: var(--radius);
          padding: 10px 18px;
          cursor: pointer;
          transition: all .15s;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 7px;
        }
        .btn-primary {
          background: var(--accent);
          color: #fff;
        }
        .btn-primary:hover { background: #4a6ef0; transform: translateY(-1px); }
        .btn-primary:active { transform: scale(.98); }
        .btn-danger {
          background: transparent;
          color: var(--danger);
          border: 1px solid #3d2222;
        }
        .btn-danger:hover { background: #2d1a1a; }
        .btn-ghost {
          background: transparent;
          color: var(--muted);
          border: 1px solid var(--border);
        }
        .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

        /* FILTERS */
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        .filter-btn {
          font-family: var(--sans);
          font-size: 12px;
          padding: 7px 12px;
          border-radius: 7px;
          border: 1px solid transparent;
          background: transparent;
          color: var(--muted);
          cursor: pointer;
          text-align: left;
          transition: all .15s;
          display: flex;
          align-items: center;
          gap: 8px;
        }
        .filter-btn:hover { background: var(--card); color: var(--text); }
        .filter-btn.active { background: #1e2a47; color: var(--accent); border-color: #2d3d6a; }
        .filter-btn .dot {
          width: 7px; height: 7px;
          border-radius: 50%;
          flex-shrink: 0;
        }

        /* SEARCH */
        .search-wrap { position: relative; }
        .search-wrap svg {
          position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
          width: 15px; height: 15px; stroke: var(--muted); pointer-events: none;
        }
        .search-wrap input { padding-left: 34px; }

        /* ─── MAIN ─── */
        main {
          grid-area: main;
          padding: 28px 32px;
          overflow-y: auto;
        }

        .main-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 24px;
        }
        .view-title { font-size: 20px; font-weight: 700; }
        .view-title span { color: var(--muted); font-weight: 300; font-size: 14px; margin-left: 8px; }

        /* TOAST */
        #toast-container {
          position: fixed; bottom: 28px; right: 28px;
          display: flex; flex-direction: column; gap: 10px;
          z-index: 999;
        }
        .toast {
          font-size: 13px;
          padding: 12px 18px;
          border-radius: var(--radius);
          background: var(--card);
          border-left: 3px solid var(--accent);
          color: var(--text);
          box-shadow: 0 8px 32px rgba(0,0,0,.4);
          animation: slideIn .25s ease;
          max-width: 300px;
        }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

        /* TASK GRID */
        #task-list {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 16px;
        }

        .task-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 12px;
          padding: 18px;
          display: flex;
          flex-direction: column;
          gap: 12px;
          transition: border-color .2s, transform .15s;
          position: relative;
          overflow: hidden;
        }
        .task-card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
        }
        .task-card.priority-LOW::before  { background: var(--low); }
        .task-card.priority-MEDIUM::before { background: var(--med); }
        .task-card.priority-HIGH::before { background: var(--high); }
        .task-card:hover { border-color: #3a4258; transform: translateY(-2px); }
        .task-card.completed { opacity: .5; }

        .task-top {
          display: flex;
          align-items: flex-start;
          gap: 10px;
        }
        .task-check {
          width: 18px; height: 18px;
          border-radius: 5px;
          border: 2px solid var(--border);
          background: transparent;
          cursor: pointer;
          flex-shrink: 0;
          display: flex; align-items: center; justify-content: center;
          transition: all .15s;
          margin-top: 2px;
        }
        .task-check.done { background: var(--success); border-color: var(--success); }
        .task-check.done::after { content: '✓'; font-size: 10px; color: #000; font-weight: 700; }
        .task-check:hover { border-color: var(--success); }

        .task-title {
          font-size: 14px;
          font-weight: 600;
          line-height: 1.4;
          flex: 1;
        }
        .task-card.completed .task-title { text-decoration: line-through; color: var(--muted); }
        .task-desc {
          font-size: 12px;
          color: var(--muted);
          line-height: 1.6;
        }

        .task-meta {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
        }
        .priority-badge {
          font-family: var(--mono);
          font-size: 10px;
          font-weight: 700;
          padding: 3px 8px;
          border-radius: 4px;
          text-transform: uppercase;
          letter-spacing: .5px;
        }
        .badge-LOW  { background: #0d2e1e; color: var(--low); }
        .badge-MEDIUM { background: #2e220d; color: var(--med); }
        .badge-HIGH { background: #2e0d0d; color: var(--high); }

        .task-date {
          font-family: var(--mono);
          font-size: 10px;
          color: var(--muted);
        }
        .task-id {
          font-family: var(--mono);
          font-size: 10px;
          color: #2d3d6a;
        }

        .task-actions {
          display: flex;
          gap: 6px;
        }
        .icon-btn {
          width: 30px; height: 30px;
          border-radius: 7px;
          border: 1px solid var(--border);
          background: transparent;
          color: var(--muted);
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          transition: all .15s;
          font-size: 13px;
        }
        .icon-btn:hover.edit  { color: var(--accent); border-color: var(--accent); background: #1e2a47; }
        .icon-btn:hover.del   { color: var(--danger); border-color: #3d2222; background: #2d1a1a; }

        /* EMPTY STATE */
        .empty {
          grid-column: 1 / -1;
          text-align: center;
          padding: 80px 20px;
          color: var(--muted);
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
        .empty p  { font-size: 13px; }

        /* MODAL */
        .modal-backdrop {
          position: fixed; inset: 0;
          background: rgba(0,0,0,.7);
          backdrop-filter: blur(4px);
          display: flex; align-items: center; justify-content: center;
          z-index: 100;
          animation: fadeIn .2s ease;
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        .modal {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 14px;
          padding: 28px;
          width: 460px;
          max-width: 95vw;
          display: flex;
          flex-direction: column;
          gap: 20px;
        }
        .modal-title {
          font-size: 17px;
          font-weight: 700;
        }
        .modal-actions {
          display: flex;
          gap: 10px;
          justify-content: flex-end;
        }

        /* LOADING */
        .spinner {
          width: 18px; height: 18px;
          border: 2px solid rgba(255,255,255,.2);
          border-top-color: #fff;
          border-radius: 50%;
          animation: spin .6s linear infinite;
          display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HTTP LOG */
        #http-log {
          position: fixed;
          bottom: 0; left: 0; right: 0;
          background: #0a0b10;
          border-top: 1px solid var(--border);
          font-family: var(--mono);
          font-size: 11px;
          color: var(--muted);
          padding: 8px 28px;
          display: flex;
          gap: 24px;
          align-items: center;
          overflow-x: auto;
          z-index: 50;
        }
        .http-entry { display: flex; gap: 8px; align-items: center; white-space: nowrap; }
        .method { font-weight: 700; }
        .method.GET    { color: #60a5fa; }
        .method.POST   { color: var(--success); }
        .method.PUT    { color: var(--warn); }
        .method.PATCH  { color: var(--accent2); }
        .method.DELETE { color: var(--danger); }
        .status-ok  { color: var(--success); }
        .status-err { color: var(--danger); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

        @media (max-width: 768px) {
          body { grid-template-columns: 1fr; grid-template-areas: "header" "sidebar" "main"; }
          aside { border-right: none; border-bottom: 1px solid var(--border); }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">task<span>/</span>manager <span style="color:#3a4258">|</span> <span>REST API Client</span></div>
    <div class="stats-bar">
        <div class="stat">Total: <strong id="stat-total">0</strong></div>
        <div class="stat">Pendentes: <strong id="stat-pending" style="color:var(--warn)">0</strong></div>
        <div class="stat">Concluídas: <strong id="stat-done" style="color:var(--success)">0</strong></div>
        <div class="api-badge">localhost:8080</div>
    </div>
</header>

<!-- SIDEBAR -->
<aside>
    <!-- NOVA TAREFA -->
    <div>
        <div class="section-label">Nova Tarefa</div>
        <div style="display:flex;flex-direction:column;gap:12px">
            <div class="form-group">
                <label>Título *</label>
                <input type="text" id="inp-title" placeholder="Ex: Estudar Spring Boot" maxlength="100" />
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea id="inp-desc" placeholder="Detalhes opcionais..." maxlength="500"></textarea>
            </div>
            <div class="form-group">
                <label>Prioridade</label>
                <select id="inp-priority">
                    <option value="LOW">🟢 Low — Baixa</option>
                    <option value="MEDIUM" selected>🟡 Medium — Média</option>
                    <option value="HIGH">🔴 High — Alta</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="createTask()">
                <span>＋</span> Criar Tarefa
                <span id="btn-create-spinner" style="display:none" class="spinner"></span>
            </button>
        </div>
    </div>

    <!-- BUSCA -->
    <div>
        <div class="section-label">Busca</div>
        <div class="search-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="inp-search" placeholder="Buscar por título..." oninput="handleSearch()" />
        </div>
    </div>

    <!-- FILTROS -->
    <div>
        <div class="section-label">Filtros</div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all" onclick="applyFilter('all',this)">
                <span class="dot" style="background:var(--accent)"></span> Todas as tarefas
            </button>
            <button class="filter-btn" data-filter="pending" onclick="applyFilter('pending',this)">
                <span class="dot" style="background:var(--warn)"></span> Pendentes
            </button>
            <button class="filter-btn" data-filter="done" onclick="applyFilter('done',this)">
                <span class="dot" style="background:var(--success)"></span> Concluídas
            </button>
            <button class="filter-btn" data-filter="HIGH" onclick="applyFilter('HIGH',this)">
                <span class="dot" style="background:var(--high)"></span> Prioridade Alta
            </button>
            <button class="filter-btn" data-filter="MEDIUM" onclick="applyFilter('MEDIUM',this)">
                <span class="dot" style="background:var(--med)"></span> Prioridade Média
            </button>
            <button class="filter-btn" data-filter="LOW" onclick="applyFilter('LOW',this)">
                <span class="dot" style="background:var(--low)"></span> Prioridade Baixa
            </button>
        </div>
    </div>

    <!-- BASE URL -->
    <div>
        <div class="section-label">Configuração</div>
        <div class="form-group">
            <label>Base URL da API</label>
            <input type="text" id="inp-baseurl" value="http://localhost:8080/api" />
        </div>
        <button class="btn btn-ghost" style="margin-top:8px;width:100%" onclick="loadtarefas()">↺ Recarregar</button>
    </div>
</aside>

<!-- MAIN -->
<main>
    <div class="main-header">
        <div class="view-title" id="view-title">Todas as tarefas <span id="view-count"></span></div>
    </div>
    <div id="task-list"></div>
</main>

<!-- HTTP LOG BAR -->
<div id="http-log">
    <span style="color:var(--muted);font-size:10px">HTTP LOG →</span>
    <span id="log-content" style="color:#2d3d6a">aguardando requisições...</span>
</div>

<!-- MODAL EDIÇÃO -->
<div id="edit-modal" class="modal-backdrop" style="display:none">
    <div class="modal">
        <div class="modal-title">✏️ Editar Tarefa</div>
        <input type="hidden" id="edit-id" />
        <div class="form-group">
            <label>Título *</label>
            <input type="text" id="edit-title" maxlength="100" />
        </div>
        <div class="form-group">
            <label>Descrição</label>
            <textarea id="edit-desc" maxlength="500"></textarea>
        </div>
        <div class="form-group">
            <label>Prioridade</label>
            <select id="edit-priority">
                <option value="LOW">🟢 Low — Baixa</option>
                <option value="MEDIUM">🟡 Medium — Média</option>
                <option value="HIGH">🔴 High — Alta</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="edit-completed">
                <option value="false">⏳ Pendente</option>
                <option value="true">✅ Concluída</option>
            </select>
        </div>
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" onclick="saveEdit()">Salvar alterações</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
    const BASE = () => document.getElementById('inp-baseurl').value.replace(/\/$/, '');
    let currentFilter = 'all';
    let searchTimeout;

    // ── HTTP CLIENT ──────────────────────────────────────────
    async function api(method, path, body) {
      const url = BASE() + path;
      const opts = {
        method,
        headers: { 'Content-Type': 'application/json' },
      };
      if (body) opts.body = JSON.stringify(body);
      logHttp(method, path);
      try {
        const res = await fetch(url, opts);
        const text = await res.text();
        const data = text ? JSON.parse(text) : null;
        logHttp(method, path, res.status, res.ok);
        if (!res.ok) {
          const msg = data?.message || data?.fields
            ? Object.values(data.fields || {}).join(', ')
            : `Erro ${res.status}`;
          throw new Error(msg);
        }
        return data;
      } catch(e) {
        if (!e.message.includes('Erro')) logHttp(method, path, 0, false);
        throw e;
      }
    }

    // ── LOG BAR ──────────────────────────────────────────────
    const logs = [];
    function logHttp(method, path, status, ok) {
      if (status !== undefined) {
        const entry = `<span class="http-entry"><span class="method ${method}">${method}</span><span>${path}</span><span class="${ok?'status-ok':'status-err'}">${status}</span></span>`;
        logs.unshift(entry);
        if (logs.length > 5) logs.pop();
        document.getElementById('log-content').innerHTML = logs.join('<span style="color:#2d3d6a">|</span>');
      }
    }

    // ── TOAST ────────────────────────────────────────────────
    function toast(msg, type='info') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    // ── LOAD / RENDER ─────────────────────────────────────────
    async function loadtarefas() {
      const list = document.getElementById('task-list');
      list.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)"><span class="spinner" style="width:28px;height:28px;border-width:3px"></span></div>`;
      try {
        let path = '/tarefas';
        let title = 'Todas as tarefas';
        if (currentFilter === 'pending') { path = '/tarefas?completed=false'; title = 'Pendentes'; }
        else if (currentFilter === 'done') { path = '/tarefas?completed=true'; title = 'Concluídas'; }
        else if (['HIGH','MEDIUM','LOW'].includes(currentFilter)) { path = `/tarefas?priority=${currentFilter}`; title = `Prioridade ${currentFilter}`; }
        const tarefas = await api('GET', path);
        rendertarefas(tarefas, title);
        updateStats();
      } catch(e) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>Não foi possível conectar</h3><p>${e.message}<br><br>Certifique-se que o Spring Boot está rodando em <code style="color:var(--accent)">${BASE()}</code></p></div>`;
      }
    }

    function rendertarefas(tarefas, title) {
      document.getElementById('view-title').innerHTML = `${title} <span>${tarefas.length} registro${tarefas.length!==1?'s':''}</span>`;
      document.getElementById('view-count').textContent = '';
      const list = document.getElementById('task-list');
      if (!tarefas.length) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><h3>Nenhuma tarefa aqui</h3><p>Crie uma nova tarefa no painel ao lado.</p></div>`;
        return;
      }
      list.innerHTML = tarefas.map(task => {
        const date = new Date(task.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
        return `
          <div class="task-card priority-${task.priority} ${task.completed?'completed':''}" id="card-${task.id}">
            <div class="task-top">
              <div class="task-check ${task.completed?'done':''}" onclick="toggleTask(${task.id})" title="Marcar como ${task.completed?'pendente':'concluída'}"></div>
              <div class="task-title">${escHtml(task.title)}</div>
            </div>
            ${task.description ? `<div class="task-desc">${escHtml(task.description)}</div>` : ''}
            <div class="task-meta">
              <span class="priority-badge badge-${task.priority}">${task.priority}</span>
              <span class="task-date">${date}</span>
              <span class="task-id">#${task.id}</span>
            </div>
            <div class="task-actions">
              <button class="icon-btn edit" onclick="openEdit(${task.id})" title="Editar">✏️</button>
              <button class="icon-btn del" onclick="deleteTask(${task.id})" title="Deletar">🗑</button>
            </div>
          </div>`;
      }).join('');
    }

    async function updateStats() {
      try {
        const all = await api('GET', '/tarefas');
        document.getElementById('stat-total').textContent = all.length;
        document.getElementById('stat-pending').textContent = all.filter(t=>!t.completed).length;
        document.getElementById('stat-done').textContent = all.filter(t=>t.completed).length;
      } catch(_){}
    }

    // ── CREATE ────────────────────────────────────────────────
    async function createTask() {
      const title = document.getElementById('inp-title').value.trim();
      if (!title) { toast('Título é obrigatório', 'error'); return; }
      const btn = document.querySelector('[onclick="createTask()"]');
      const spinner = document.getElementById('btn-create-spinner');
      btn.disabled = true; spinner.style.display = 'inline-block';
      try {
        await api('POST', '/tarefas', {
          title,
          description: document.getElementById('inp-desc').value.trim() || null,
          priority: document.getElementById('inp-priority').value,
          completed: false,
        });
        document.getElementById('inp-title').value = '';
        document.getElementById('inp-desc').value = '';
        toast('✅ Tarefa criada!', 'success');
        loadTarefas();
      } catch(e) { toast('Erro: ' + e.message, 'error'); }
      finally { btn.disabled = false; spinner.style.display = 'none'; }
    }

    // ── TOGGLE ────────────────────────────────────────────────
    async function toggleTask(id) {
      try {
        await api('PATCH', `/tarefas/${id}/toggle`);
        loadTarefas();
      } catch(e) { toast('Erro ao atualizar: ' + e.message, 'error'); }
    }

    // ── DELETE ────────────────────────────────────────────────
    async function deleteTask(id) {
      if (!confirm(`Deletar tarefa #${id}?`)) return;
      try {
        await api('DELETE', `/tarefas/${id}`);
        document.getElementById(`card-${id}`)?.remove();
        toast('🗑 Tarefa removida', 'info');
        updateStats();
      } catch(e) { toast('Erro: ' + e.message, 'error'); }
    }

    // ── EDIT MODAL ────────────────────────────────────────────
    async function openEdit(id) {
      try {
        const task = await api('GET', `/tarefas/${id}`);
        document.getElementById('edit-id').value = task.id;
        document.getElementById('edit-title').value = task.title;
        document.getElementById('edit-desc').value = task.description || '';
        document.getElementById('edit-priority').value = task.priority;
        document.getElementById('edit-completed').value = String(task.completed);
        document.getElementById('edit-modal').style.display = 'flex';
      } catch(e) { toast('Erro ao abrir tarefa: ' + e.message, 'error'); }
    }

    function closeModal() {
      document.getElementById('edit-modal').style.display = 'none';
    }

    async function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const title = document.getElementById('edit-title').value.trim();
      if (!title) { toast('Título é obrigatório', 'error'); return; }
      try {
        await api('PUT', `/tarefas/${id}`, {
          title,
          description: document.getElementById('edit-desc').value.trim() || null,
          priority: document.getElementById('edit-priority').value,
          completed: document.getElementById('edit-completed').value === 'true',
        });
        closeModal();
        toast('💾 Tarefa atualizada!', 'success');
        loadTarefas();
      } catch(e) { toast('Erro: ' + e.message, 'error'); }
    }

    // ── FILTERS ───────────────────────────────────────────────
    function applyFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('inp-search').value = '';
      loadTarefas();
    }

    // ── SEARCH ────────────────────────────────────────────────
    function handleSearch() {
      clearTimeout(searchTimeout);
      const q = document.getElementById('inp-search').value.trim();
      searchTimeout = setTimeout(async () => {
        if (!q) { loadTarefas(); return; }
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        currentFilter = 'search';
        try {
          const tarefas = await api('GET', `/tarefas?search=${encodeURIComponent(q)}`);
          rendertarefas(tarefas, `Busca: "${q}"`);
        } catch(e) { toast('Erro na busca: ' + e.message, 'error'); }
      }, 400);
    }

    // ── UTILS ─────────────────────────────────────────────────
    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Fechar modal ao clicar fora
    document.getElementById('edit-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Enter para criar
    document.getElementById('inp-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') createTask();
    });

    // ── INIT ──────────────────────────────────────────────────
    loadTarefas();
</script>
</body>
</html>
